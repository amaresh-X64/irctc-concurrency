services:
  postgres:
    image: postgres:15
    container_name: irctc_postgres
    environment:
      POSTGRES_DB: irctc_db
      POSTGRES_USER: irctc_user
      POSTGRES_PASSWORD: irctc_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - irctc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irctc_user -d irctc_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: irctc_redis
    ports:
      - "6379:6379"
    networks:
      - irctc_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  fastapi-trains:
    build:
      context: ./fastapi-trains
      dockerfile: Dockerfile
    container_name: irctc_fastapi
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://irctc_user:irctc_pass@postgres:5432/irctc_db
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - irctc_network
    restart: unless-stopped

  # ─── Gin — Booking + Concurrency ──────────────
  gin-booking:
    build:
      context: ./gin-booking
      dockerfile: Dockerfile
    container_name: irctc_gin
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgres://irctc_user:irctc_pass@postgres:5432/irctc_db?sslmode=disable
      REDIS_URL: redis:6379
      SPRINGBOOT_URL: http://springboot-payment:8003
      FASTAPI_URL: http://fastapi-trains:8001
      PORT: "8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - irctc_network
    restart: unless-stopped

  # ─── Spring Boot — Payment + PNR ──────────────
  springboot-payment:
    build:
      context: ./springboot-payment
      dockerfile: Dockerfile
    container_name: irctc_springboot
    ports:
      - "8003:8003"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/irctc_db
      SPRING_DATASOURCE_USERNAME: irctc_user
      SPRING_DATASOURCE_PASSWORD: irctc_pass
      SERVER_PORT: "8003"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - irctc_network
    restart: unless-stopped

  # ─── React Frontend ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: irctc_frontend
    ports:
      - "3000:80"
    environment:
      VITE_GIN_URL: http://localhost:8002
      VITE_FASTAPI_URL: http://localhost:8001
      VITE_SPRINGBOOT_URL: http://localhost:8003
    depends_on:
      - gin-booking
      - fastapi-trains
      - springboot-payment
    networks:
      - irctc_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  irctc_network:
    driver: bridge