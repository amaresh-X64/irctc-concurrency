services:
  postgres:
    image: postgres:15
    container_name: irctc_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - irctc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: irctc_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - irctc_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  fastapi-trains:
    build:
      context: ./fastapi-trains
      dockerfile: Dockerfile
    container_name: irctc_fastapi
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - irctc_network
    restart: unless-stopped

  gin-booking:
    build:
      context: ./gin-booking
      dockerfile: Dockerfile
    container_name: irctc_gin
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SPRINGBOOT_URL: ${SPRINGBOOT_URL}
      FASTAPI_URL: ${FASTAPI_URL}
      PORT: ${PORT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - irctc_network
    restart: unless-stopped

  springboot-payment:
    build:
      context: ./springboot-payment
      dockerfile: Dockerfile
    container_name: irctc_springboot
    ports:
      - "8003:8003"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SERVER_PORT: ${SERVER_PORT}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - irctc_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: irctc_frontend
    ports:
      - "3000:80"
    environment:
      VITE_GIN_URL: http://localhost:8002
      VITE_FASTAPI_URL: http://localhost:8001
      VITE_SPRINGBOOT_URL: http://localhost:8003
    depends_on:
      - gin-booking
      - fastapi-trains
      - springboot-payment
    networks:
      - irctc_network
    restart: unless-stopped

volumes:
  postgres_data:
  es_data:

networks:
  irctc_network:
    driver: bridge