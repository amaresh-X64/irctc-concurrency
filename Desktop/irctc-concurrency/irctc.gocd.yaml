format_version: 10

pipelines:
  irctc-concurrency:
    group: irctc
    label_template: "${COUNT}"
    materials:
      github:
        git: https://github.com/amaresh-X64/irctc-concurrency.git
        branch: main

    stages:
      - test:
          jobs:
            test-fastapi:
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - cd fastapi-trains && pip install -r requirements.txt && pytest app/ -v

            test-gin:
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - cd gin-booking && go test ./...

            test-springboot:
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - cd springboot-payment && mvn test -q

      - build:
          jobs:
            docker-build:
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - docker compose build

      - deploy:
          jobs:
            docker-deploy:
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - |
                        docker compose --env-file .env down --remove-orphans
                        docker compose --env-file .env up -d
                        docker compose ps