format_version: 10

pipelines:
  irctc-concurrency:
    group: irctc
    label_template: "${COUNT}"
    materials:
      github:
        git: https://github.com/amaresh-X64/irctc-concurrency.git
        branch: main

    stages:
      - test:
          jobs:
            test-fastapi:
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - |
                        cd Desktop/irctc-concurrency/fastapi-trains
                        pip install -r requirements.txt
                        pip install pytest
                        DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/irctc \
                        JWT_SECRET_KEY=test-secret \
                        python3 -m pytest app/ -v
            test-gin:
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - cd Desktop/irctc-concurrency/gin-booking && JWT_SECRET_KEY=test-secret go test ./...
            test-springboot:
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - cd Desktop/irctc-concurrency/springboot-payment && mvn test -q

      - build:
          jobs:
            docker-build:
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - cd Desktop/irctc-concurrency && docker compose build

      - deploy:
          jobs:
            docker-deploy:
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - |
                        cd /godata/pipelines/irctc-concurrency/Desktop/irctc-concurrency
                        if [ ! -f .env ]; then
                          echo "ERROR: .env file not found!"
                          exit 1
                        fi
                        docker compose --env-file .env down --remove-orphans
                        docker compose --env-file .env up -d 2>&1
                        echo "Exit code: $?"
                        docker compose ps