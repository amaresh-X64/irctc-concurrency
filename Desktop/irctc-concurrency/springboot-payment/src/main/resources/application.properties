server.port=${SERVER_PORT:8003}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/irctc_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:irctc_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.application.name=irctc-payment-service
logging.level.com.irctc=DEBUG

jwt.secret-key=${JWT_SECRET_KEY}

# ── OTel Java agent config ────────────────────────────────────────────────
# OTEL_SERVICE_NAME and OTEL_EXPORTER_OTLP_ENDPOINT come from docker-compose env vars.
# These properties are fallbacks if running outside Docker.
otel.service.name=${OTEL_SERVICE_NAME:springboot-payment}
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
otel.exporter.otlp.protocol=${OTEL_EXPORTER_OTLP_PROTOCOL:grpc}
otel.traces.exporter=otlp
# Propagate trace context across HTTP headers (W3C TraceContext standard)
otel.propagators=tracecontext,baggage
# Include trace/span IDs in log output automatically
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} traceId=%X{trace_id} spanId=%X{span_id} - %msg%n
