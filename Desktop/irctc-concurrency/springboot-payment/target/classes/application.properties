server.port=${SERVER_PORT:8003}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/irctc_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:irctc_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.application.name=irctc-payment-service
logging.level.com.irctc=DEBUG

jwt.secret-key=${JWT_SECRET_KEY}
