format_version: 1
pipelines:
  irctc-concurrency:
    group: irctc
    materials:
      git:
        url: https://github.com/amaresh-X64/irctc-concurrency
        branch: main
    stages:
      - test:
          fetch_materials: true
          jobs:
            test-gin:
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        cd Desktop/irctc-concurrency/gin-booking
                        docker run --rm \
                          -v $(pwd):/app \
                          -w /app \
                          -e JWT_SECRET_KEY=test-secret \
                          golang:1.22 \
                          go test ./...
            test-fastapi:
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        cd Desktop/irctc-concurrency/fastapi-trains
                        docker run --rm \
                          -v $(pwd):/app \
                          -w /app \
                          -e DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/irctc \
                          -e JWT_SECRET_KEY=test-secret \
                          python:3.11 \
                          sh -c "pip install -r requirements.txt -q && pip install pytest -q && python3 -m pytest app/ -v"
            test-springboot:
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        cd Desktop/irctc-concurrency/springboot-payment
                        docker run --rm \
                          -v $(pwd):/app \
                          -w /app \
                          maven:3.9-eclipse-temurin-21 \
                          mvn test -q

      - build:
          fetch_materials: true
          jobs:
            build-all:
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - docker compose -f Desktop/irctc-concurrency/docker-compose.yml build

      - deploy:
          fetch_materials: true
          jobs:
            deploy-all:
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - docker compose -f Desktop/irctc-concurrency/docker-compose.yml up -d --force-recreate